<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Media Library</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav aria-label="Global navigation">

             <a href="index.html" class="logo">
                <img src="assets/logo_white.svg" alt="Digital Media Library Logo">
            </a>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="games.html">Games</a></li>
                <li><a href="quiz.html">Quiz</a></li>
            </ul>
        </nav>
    </header>

    <main class="games-page">

        <section class="page-title">

            <h1>Games</h1>
            <p>Explore my top 7 favorite games.</p>
        
        </section>

         <!-- Shelf Interface -->
        <section class="shelf">

            <!-- Shelf items -->
            <div class="shelf-items" id="game-shelf">
                 <!-- Shelf items will be generated with JS -->
            </div>

            <!-- Show selected game title and button for detail view -->
            <div class="selected-media">
                <h2 id="selected-game-title">Select a game</h2>
                <a href="#game-details">More details</a>
            </div>

        </section>

        <!-- Detail View -->
        <!-- Hidden by default and revealed when a book is selected -->
        <section class="media-details hidden" id="game-details">

            <!-- Detail View will be dynamically generated with JS-->
            <article class="media-details_layout">

                <!-- Decorative Element Only -->
                <span class="ticket-cutout" aria-hidden="true"></span>

                <div class="media-details_image">
                    <img id="selected-game-image" src="" alt="">
                </div>

                <div class="media-details_content">
                    <h2 id="detail-game-title"></h2>
                    <p id="selected-game-developer"></p>
                    <p id="selected-game-comment"></p>
                </div>
            </article>

        </section>

    </main>

    <footer>
        <p>Digital Media Library</p>
    </footer>

    <script src="js/games.js"></script>

</body>
</html>
