<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse my favorite video games.">
    <title>Games | Digital Media Library</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
        integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
        crossorigin="anonymous" defer></script>

    <script src="js/script.js" defer></script>
    <script src="js/data.js" defer></script>
    <script src="js/mediaShelf.js" defer></script>
    <script src="js/gamesPage.js" defer></script>
</head>
<body>

    <header hx-get="components/header.html" hx-trigger="load" hx-swap="innerHTML"></header>

    <main class="games-page">

        <section class="page-title">

            <h1>Games</h1>
            <p>Explore my top 7 favorite games.</p>
        
        </section>

         <!-- Shelf Interface -->
        <section class="shelf">

            <!-- Shelf items -->
            <div class="shelf-items" id="media-shelf" aria-label="Game shelf">
                 <!-- Shelf items will be generated with JS -->
            </div>

            <!-- Show selected game title and button for detail view -->
            <div class="selected-media">
                <h2 id="selected-media-title">Select a game</h2>
                <a href="#media-details" id="more-details-link" class="hidden">More details</a>
            </div>

        </section>

        <!-- Detail View -->
        <!-- Hidden by default and revealed when a book is selected -->
        <section class="media-details hidden" id="media-details">

            <!-- Detail View will be dynamically generated with JS-->
            <article class="media-details_layout">

                <!-- Decorative Element Only -->
                <span class="ticket-cutout" aria-hidden="true"></span>

                <div class="media-details_image">
                    <img id="selected-media-image" src="" alt="">
                </div>

                <div class="media-details_content">
                    <h2 id="detail-media-title"></h2>
                    <p id="selected-media-author"></p>
                    <p id="selected-media-comment"></p>
                </div>
            </article>

        </section>

    </main>

    <footer hx-get="components/footer.html" hx-trigger="load" hx-swap="innerHTML"></footer>

</body>
</html>
