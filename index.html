<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Media Library</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <header>
        <nav aria-label="Global navigation">

            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Digital Media Library Logo">
            </a>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="games.html">Games</a></li>
                <li><a href="quiz.html">Quiz</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- Library Card -->
        <section class="library-card">

            <div class="library-card_top">
                <h2>Member Card</h2>
            </div>

            <!-- Main content of the library card -->
            <div class="library-card_main">

                <div class="library-card__image">
                    <img src="assets/profiletest.png" alt="-">
                </div>

                <div class="library-card__content">

                    <div>
                        <p>Name</p>
                        <p>Sarah Elsayed</p>
                    </div>

                    <div>
                        <p>Issued</p>
                        <p>2026</p>
                    </div>
                    
                    <div class="genre-profile">
                        <p>Genre Profile</p>
                        <ul class="genre-profile_list">
                            <li class="tag">Fiction</li>
                            <li class="tag">Horror</li>
                            <li class="tag">RPG</li>
                            <li class="tag">Romance</li>
                        </ul>
                    </div>

                </div>

            </div>

        </section>

        <!-- Description of the website -->
        <section>
            <p>Description</p>
        </section>
        
    </main>

    <footer>
        <p>Digital Media Library</p>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
