<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A digital media library showcasing favorite books, games, and an interactive recommendation quiz.">
    <title>Digital Media Library</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <header hx-get="components/header.html" hx-trigger="load" hx-swap="innerHTML"></header>

    <main class="home-page">

        <!-- Library Card -->
        <article class="library-card">

            <div class="library-card_top">
                <img src="assets/logo_blackmini.svg" alt="Digital Media Library Mini-Logo">
                <h1>Member Card</h1>
            </div>

            <!-- Main content of the library card -->
            <div class="library-card_main">

                <div class="library-card_image">
                    <!-- Width and height added to improve Lighthouse score and prevent layout shifts -->
                    <img 
                        src="assets/library-profile.png" 
                        class="chibi" 
                        alt="Chibi-style illustration representing Sarah Elsayed" 
                        width="300" 
                        height="300"
                    >
                </div>

                <div class="library-card_content">

                    <div>
                        <h2>Name</h2>
                        <p>Sarah Elsayed</p>
                    </div>

                    <div>
                        <h2>Issued</h2>
                        <p>11/05/2026</p>
                    </div>
                    
                    <div class="genre-profile">
                        <h2>Genre Profile</h2>
                        <ul class="genre-profile_list">
                            <li class="tag">Fiction</li>
                            <li class="tag-d">Horror</li>
                            <li class="tag">RPG</li>
                            <li class="tag-c">Romance</li>
                            <li class="tag-b">Dark</li>
                        </ul>
                    </div>

                </div>

            </div>

            <!-- Bottom part of the library card; Decorative Element Only -->
            <div class="library-card_bottom">
                <div class="barcode" aria-hidden="true"></div>
            </div>

            <!-- Decorative sticker element -->
            <!-- TODO: Replace temporary sticker asset -->
            <img src="assets/stickertest.png" class="sticker" alt="" aria-hidden="true">

        </article>

        <!-- Description of the website -->
        <section class="home-description">

            <p> 
                Welcome to my Digital Media Library! 
                Explore a curated collection of favorite books and games, 
                with personal notes and recommendations. 
            </p>
            
        </section>
        
    </main>

    <footer hx-get="components/footer.html" hx-trigger="load" hx-swap="innerHTML"></footer>

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
        integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
        crossorigin="anonymous"></script>

    <script src="js/script.js"></script>

</body>
</html>
