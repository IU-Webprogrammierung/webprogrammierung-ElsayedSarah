<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Take a recommendation quiz to discover books and games that match your interests.">
    <title>Quiz | Digital Media Library</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
        integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
        crossorigin="anonymous" defer></script>

    <script src="js/script.js" defer></script>
    <script src="js/data.js" defer></script>
    <script src="js/quiz.js" defer></script>
</head>
<body>
    
    <header hx-get="components/header.html" hx-trigger="load" hx-swap="innerHTML"></header>

    <main class="quiz-page">

        <!-- Quiz Section -->
        <section class="quiz-section">

            <article class="quiz">

                <div class="quiz-screen">
                    <!-- For decoration and character sprites -->

                </div>
                
                <!-- Allow screen readers to announce newly generated quiz content -->
                <div class="quiz-questions" id="quiz-game" aria-live="polite">
                    <!-- Quiz will be generated with JS -->
                </div>

            </article>
        </section>
        
        <!-- Quiz Result Screen -->
        <section class="quiz-results hidden" id="quiz-results">

            <!-- Recommended media will be generated with JS -->
    
        </section>

    </main>

    <footer hx-get="components/footer.html" hx-trigger="load" hx-swap="innerHTML"></footer>

</body>
</html>
