<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse a curated library of my favorite books and games.">
    <title>Library | Digital Media Library</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo-favicon.svg" type="image/svg+xml">

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
        integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
        crossorigin="anonymous" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js" defer></script>

    <script src="js/script.js" defer></script>
    <script src="js/data.js" defer></script>
    <script src="js/mediaShelf.js" defer></script>
    <script src="js/libraryPage.js" defer></script>
</head>
<body>

    <header hx-get="components/header.html" hx-trigger="load" hx-swap="innerHTML"></header>

    <main class="library-page">

        <!-- Library Hero -->
        <section class="library-hero">

            <!-- Updated dynamically; books are shown by default -->
            <h1 id="library-title">Books</h1>
            <p id="library-description">Explore my top 14 favorite books, divided into novels and manga.</p>

            <!-- Media type switch -->
            <div class="library-type-switch" role="group" aria-label="Choose library media type">
                <span id="library-status" class="hidden" aria-live="polite"></span>

                 <!-- Animated indicator that moves beneath the active media type button -->
                <span class="library-type-indicator" aria-hidden="true"></span>

                <button type="button" id="show-books" aria-pressed="true">Books</button>
                <button type="button" id="show-games" aria-pressed="false">Games</button>
            </div>

        </section>

        <!-- Shelf Interface -->
        <section class="shelf">

            <!-- Book category filters; hidden when games are displayed -->
            <div class="filter hidden" id="book-filters">
                <!-- Mobile filter toggle -->
                <button type="button" class="filter-toggle" id="filter-toggle" aria-expanded="false" aria-controls="filter-options">☰ Filter</button>

               
                <div class="filter-options" id="filter-options" role="group" aria-label="Choose book category">
                    <!-- Animated indicator that moves beneath the active filter button -->
                    <span class="filter-indicator" aria-hidden="true"></span>
                    
                    <button type="button" data-filter="all" aria-pressed="true">All</button>
                    <button type="button" data-filter="novel" aria-pressed="false">Novel</button>
                    <button type="button" data-filter="manga" aria-pressed="false">Manga</button>
                </div>
            </div>

            <!-- Shelf items -->
            <ul class="shelf-items" id="media-shelf" aria-label="Book shelf items">
                <!-- Generated by mediaShelf.js -->
            </ul>

            <!-- Show selected media title and button for detail view -->
            <div class="selected-media" aria-live="polite">
                <h2 id="selected-media-title">Select a book</h2>
                <a href="#media-details" id="more-details-link" class="hidden">More details</a>
            </div>

        </section>

        <!-- Detail view; hidden until a media item is selected -->
        <section class="media-details hidden" id="media-details">
            
            <!-- Dynamically generated by mediaShelf.js -->
            <article class="media-details_layout">

                <div class="media-details_image">
                    <img id="selected-media-image" src="" alt="Cover of the selected media item">
                </div>

                <div class="media-details_content">
                    <h2 id="detail-media-title"></h2>
                    <p id="selected-media-author"></p>
                    <p id="selected-media-comment"></p>
                </div>
            </article>

        </section>

    </main>

    <footer hx-get="components/footer.html" hx-trigger="load" hx-swap="innerHTML"></footer>
   
</body>
</html>
