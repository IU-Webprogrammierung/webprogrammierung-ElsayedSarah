<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo-favicon.svg" type="image/svg+xml">
</head>
<body>

    <main class="error-page">

         <!-- Custom 404 page reusing the library card component to maintain a consistent visual style across the website -->
        <article class="library-card error-card">

            <div class="library-card_top">
                <h1>404</h1>
            </div>

            <div class="library-card_main">
                <div class="error-content">

                    <h2>Page Not Found</h2>

                    <p>Looks like this page got lost in the library.</p>

                    <a href="index.html">Return Home</a>

                </div>
            </div>

            <div class="library-card_bottom error-card_bottom">
                <div class="barcode" aria-hidden="true"></div>
            </div>

        </article>

    </main>

</body>
</html>
