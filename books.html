<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Media Library</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav aria-label="Global navigation">

             <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Digital Media Library Logo">
            </a>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="games.html">Games</a></li>
                <li><a href="quiz.html">Quiz</a></li>
            </ul>
        </nav>
    </header>

    <main class="books-page">

         <!-- Page Title -->
        <section class="page-title">

            <h1>Books</h1>
            <p>Explore my top 14 favorite books, divided into novels and manga.</p>

        </section>

         <!-- Shelf Interface -->
        <section class="shelf">

            <!-- Filter Buttons -->
            <div class="filter">
                <button id="filter-novel">Novel</button>
                <button id="filter-manga">Manga</button>
            </div>

            <!-- Shelf items -->
            <div class="shelf-items" id="book-shelf">
                <!-- Shelf items will be generated with JS -->
            </div>

            <!-- Show selected book title and button for detail view -->
            <div class="selected-media">
                <h2 id="selected-book-title">Select a book</h2>
                <a href="#book-details">More details</a>
            </div>

        </section>

        <!-- Detail View -->
        <section class="media-details" id="book-details">
            
            <!-- Detail View will be dynamically generated with JS-->
            <article class="media-details_layout">
                <div class="media-details_image">
                    <img id="selected-book-image" src="" alt="">
                </div>

                <div class="media-details_content">
                    <h2 id="detail-book-title"></h2>
                    <p id="selected-book-author"></p>
                    <p id="selected-book-comment"></p>
                </div>
            </article>

        </section>

    </main>

    <footer>
        <p>Digital Media Library</p>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
