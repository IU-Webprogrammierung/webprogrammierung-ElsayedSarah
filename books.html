<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse my favorite novels and manga.">
    <title>Books | Digital Media Library</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo-favicon.svg" type="image/svg+xml">

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
        integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
        crossorigin="anonymous" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js" defer></script>

    <script src="js/script.js" defer></script>
    <script src="js/data.js" defer></script>
    <script src="js/mediaShelf.js" defer></script>
    <script src="js/booksPage.js" defer></script>
</head>
<body>

    <header hx-get="components/header.html" hx-trigger="load" hx-swap="innerHTML"></header>

    <main class="books-page">

         <!-- Page Title -->
        <section class="page-title">

            <h1>Books</h1>
            <p>Explore my top 14 favorite books, divided into novels and manga.</p>

        </section>

         <!-- Shelf Interface -->
        <section class="shelf">

            <div class="filter">

                <!-- Filter Toggle Button for Mobile View -->
                <button class="filter-toggle" id="filter-toggle" aria-label="Toggle book category filter">☰ Filter</button>

                <!-- Filter Buttons for Book category -->
                <div class="filter-options" id="filter-options" role="group" aria-label="Book category filters">
                    <!-- Animated indicator that moves beneath the active filter button -->
                    <span class="filter-indicator" aria-hidden="true"></span>
                    
                    <button id="all-books">All</button>
                    <button id="filter-novel">Novel</button>
                    <button id="filter-manga">Manga</button>
                </div>

            </div>

            <!-- Shelf items -->
            <div class="shelf-items" id="media-shelf" aria-label="Book shelf">
                <!-- Shelf items will be generated with JS -->
            </div>

            <!-- Show selected book title and button for detail view -->
            <div class="selected-media">
                <h2 id="selected-media-title">Select a book</h2>
                <a href="#media-details" id="more-details-link" class="hidden">More details</a>
            </div>

        </section>

        <!-- Detail View -->
         <!-- Hidden by default and revealed when a book is selected -->
        <section class="media-details hidden" id="media-details">
            
            <!-- Detail View will be dynamically generated with JS-->
            <article class="media-details_layout">

                <!-- Decorative Element Only -->
                <span class="ticket-cutout" aria-hidden="true"></span>

                <div class="media-details_image">
                    <img id="selected-media-image" src="" alt="Cover of the selected media item">
                </div>

                <div class="media-details_content">
                    <h2 id="detail-media-title"></h2>
                    <p id="selected-media-author"></p>
                    <p id="selected-media-comment"></p>
                </div>
            </article>

        </section>

    </main>

    <footer hx-get="components/footer.html" hx-trigger="load" hx-swap="innerHTML"></footer>
   
</body>
</html>
