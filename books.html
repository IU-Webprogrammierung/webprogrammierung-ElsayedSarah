<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Media Library</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header hx-get="components/header.html" hx-trigger="load" hx-swap="innerHTML"></header>

    <main class="books-page">

         <!-- Page Title -->
        <section class="page-title">

            <h1>Books</h1>
            <p>Explore my top 14 favorite books, divided into novels and manga.</p>

        </section>

         <!-- Shelf Interface -->
        <section class="shelf">

            <!-- Filter Buttons -->
            <div class="filter">
                <button id="filter-novel">Novel</button>
                <button id="filter-manga">Manga</button>
            </div>

            <!-- Shelf items -->
            <div class="shelf-items" id="book-shelf">
                <!-- Shelf items will be generated with JS -->
            </div>

            <!-- Show selected book title and button for detail view -->
            <div class="selected-media">
                <h2 id="selected-book-title">Select a book</h2>
                <a href="#book-details">More details</a>
            </div>

        </section>

        <!-- Detail View -->
         <!-- Hidden by default and revealed when a book is selected -->
        <section class="media-details hidden" id="book-details">
            
            <!-- Detail View will be dynamically generated with JS-->
            <article class="media-details_layout">

                <!-- Decorative Element Only -->
                <span class="ticket-cutout" aria-hidden="true"></span>

                <div class="media-details_image">
                    <img id="selected-book-image" src="" alt="">
                </div>

                <div class="media-details_content">
                    <h2 id="detail-book-title"></h2>
                    <p id="selected-book-author"></p>
                    <p id="selected-book-comment"></p>
                </div>
            </article>

        </section>

    </main>

    <footer hx-get="components/footer.html" hx-trigger="load" hx-swap="innerHTML"></footer>

    <script src="js/books.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
        integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
        crossorigin="anonymous"></script>

</body>
</html>
